<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Personliga Filmtopplistan!</h1>
    <div class="main">
      <input
        type="text"
        id="inputField"
        placeholder="Search for a movie title!"
      />
      <button id="saveBtn">Save Movie</button>
    </div>

    <div class="aboutPage">
      <p>Find your favorite movies & sort them by your personal rating!</p>
    </div>
    <ul id="movieList"></ul>
    <div class="searchSection">
      <input
        type="text"
        id="inputFieldID"
        placeholder="Enter a movie ID, eg: 8eb3"
      />
      <button id="searchByIDBtn">Find a movie by ID</button>
    </div>
    <ul id="movieListID"></ul>
  </body>
</html>
